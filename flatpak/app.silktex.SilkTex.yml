#
# Flatpak manifest for Flathub.
# GNOME 49 already ships GTK4, libadwaita, gtksourceview5 and poppler-glib,
# so we only build SilkTex here.
#
# LaTeX compile tools (pdflatex, bibtex, makeindex, synctex) are executed
# from the host via `flatpak-spawn --host`. Bundling TeX Live would add
# several GB to the Flatpak.
#
# This is why we request `--talk-name=org.freedesktop.Flatpak`.
# Flathub reviewers may ask to tighten this. If needed:
#   1. Use `org.freedesktop.Sdk.Extension.texlive` and compile in-sandbox.
#   2. Disable compile support in Flatpak and document an override command.
app-id: app.silktex.SilkTex
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: silktex

finish-args:
  # Basic desktop app permissions.
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

  # Network access for package installs and web links.
  - --share=network

  # LaTeX projects often live outside sandbox dirs, so we keep host FS access.
  # This matches how other LaTeX editors are packaged on Flathub.
  - --filesystem=host

  # App config and cache directories.
  - --filesystem=xdg-config/silktex:create
  - --filesystem=xdg-cache/silktex:create

  # Open compiled PDFs in external viewers via the portal.
  - --talk-name=org.freedesktop.portal.OpenURI

  # Needed for `flatpak-spawn --host` to call host TeX tools.
  - --talk-name=org.freedesktop.Flatpak

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/gtk-doc
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: silktex
    buildsystem: meson
    config-opts:
      # flatpak-builder already passes --prefix=/app; -Dprefix duplicates it on Meson.
      - --buildtype=release
    sources:
      # Flathub requires reproducible sources: always pin tag + commit SHA.
      - type: git
        url: https://github.com/DERK0CHER/SilkTex.git
        tag: v0.9.1
        commit: ecc2019deedb42724b1061b7ff27a5c2e8dbb4f0
        x-checker-data:
          type: git
          tag-pattern: '^v([\d.]+)$'
